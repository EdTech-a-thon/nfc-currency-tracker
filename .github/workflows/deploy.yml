name: Test and deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: production
  cancel-in-progress: false
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./test.db
      SESSION_SECRET: test-only-secret-at-least-32-characters
      CARD_BASE_URL: https://cards.example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate && npx prisma db push
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trust VM host key
        run: mkdir -p ~/.ssh && printf '%s\n' "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
      - name: Install SSH key
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: printf '%s' "$KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
      - name: Deploy
        run: ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" 'cd "${{ secrets.DEPLOY_PATH }}" && ./deploy.sh'
